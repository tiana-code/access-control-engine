spring:
  application:
    name: access-control-engine
  datasource:
    url: jdbc:h2:mem:accesscontrol;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  security:
    user:
      name: admin
      password: admin

server:
  port: 8080
